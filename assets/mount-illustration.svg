<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Mount position illustration</title>
  <desc id="desc">Stylized BJJ mount position with top player controlling the torso.</desc>
  <defs>
    <linearGradient id="mat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4e6"/>
      <stop offset="100%" stop-color="#ffe3ca"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#9f5836" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="1120" height="620" rx="36" fill="url(#mat)"/>
  <rect x="100" y="95" width="1000" height="510" rx="28" fill="#fffaf2" stroke="#d9baa0" stroke-width="4"/>

  <ellipse cx="600" cy="500" rx="280" ry="60" fill="#c9d7df" opacity="0.5"/>

  <g filter="url(#soft)">
    <ellipse cx="600" cy="390" rx="220" ry="88" fill="#4b8fb2"/>
    <ellipse cx="600" cy="390" rx="182" ry="58" fill="#67a9c9"/>
    <circle cx="790" cy="365" r="45" fill="#4b8fb2"/>
    <circle cx="790" cy="365" r="31" fill="#f3d2b1"/>
    <rect x="470" y="318" width="265" height="38" rx="19" fill="#3d7793"/>

    <ellipse cx="600" cy="302" rx="170" ry="80" fill="#d4542a"/>
    <ellipse cx="600" cy="302" rx="135" ry="52" fill="#ec7b54"/>
    <circle cx="430" cy="272" r="44" fill="#d4542a"/>
    <circle cx="430" cy="272" r="30" fill="#f3d2b1"/>

    <path d="M500 360 C470 430, 445 470, 414 520" stroke="#d4542a" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M700 360 C735 430, 760 470, 792 520" stroke="#d4542a" stroke-width="44" stroke-linecap="round" fill="none"/>

    <path d="M560 320 C530 350, 505 365, 468 378" stroke="#f3d2b1" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M642 320 C672 350, 697 365, 734 378" stroke="#f3d2b1" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9"/>
  </g>

  <text x="110" y="168" font-family="'Bebas Neue', sans-serif" font-size="72" fill="#8f3518" letter-spacing="2">MOUNT</text>
  <text x="110" y="214" font-family="'Work Sans', sans-serif" font-size="28" fill="#40575e">Top player controls hips and shoulders</text>
</svg>
