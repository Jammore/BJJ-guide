<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Closed Guard illustration</title>
  <desc id="desc">Stylized BJJ closed guard with bottom player controlling posture and closed legs.</desc>
  <defs>
    <linearGradient id="mat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#effcf4"/>
      <stop offset="100%" stop-color="#dbf4e6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2b5b47" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="40" y="40" width="1120" height="620" rx="36" fill="url(#mat)"/>
  <rect x="100" y="95" width="1000" height="510" rx="28" fill="#f6fff9" stroke="#9bcab2" stroke-width="4"/>

  <ellipse cx="600" cy="500" rx="290" ry="62" fill="#bfd9cb" opacity="0.55"/>

  <g filter="url(#soft)">
    <ellipse cx="600" cy="420" rx="230" ry="95" fill="#2f7758"/>
    <ellipse cx="600" cy="420" rx="182" ry="62" fill="#4e9f7c"/>
    <circle cx="430" cy="390" r="44" fill="#2f7758"/>
    <circle cx="430" cy="390" r="30" fill="#f3d2b1"/>

    <ellipse cx="600" cy="308" rx="130" ry="84" fill="#4b8fb2"/>
    <ellipse cx="600" cy="308" rx="98" ry="58" fill="#66abc9"/>
    <circle cx="770" cy="280" r="43" fill="#4b8fb2"/>
    <circle cx="770" cy="280" r="29" fill="#f3d2b1"/>

    <path d="M492 410 C540 350, 662 350, 708 410" stroke="#2f7758" stroke-width="48" stroke-linecap="round" fill="none"/>
    <path d="M496 414 C544 358, 658 358, 704 414" stroke="#6fba97" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.7"/>

    <path d="M565 355 C575 320, 578 286, 583 252" stroke="#f3d2b1" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M635 355 C625 320, 622 286, 617 252" stroke="#f3d2b1" stroke-width="16" stroke-linecap="round" fill="none"/>
  </g>

  <text x="110" y="168" font-family="'Bebas Neue', sans-serif" font-size="72" fill="#215942" letter-spacing="2">CLOSED GUARD</text>
  <text x="110" y="214" font-family="'Work Sans', sans-serif" font-size="28" fill="#34564a">Bottom player breaks posture and attacks angles</text>
</svg>
